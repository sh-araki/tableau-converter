/* ===============================
 * 汎用 table renderer
 * =============================== */
function renderTable(rows) {
  if (rows.length === 0) return "<i>no data</i>";

  const allColumns = Object.keys(rows[0]).filter(c => c !== "node_baseid");

  const columns = allColumns.filter(col =>
    rows.some(row => row[col] !== null && row[col] !== "" && row[col] !== undefined)
  );

  if (columns.length === 0) return "";

  let html = "<table><thead><tr>";
  columns.forEach(col => html += `<th>${col}</th>`);
  html += "</tr></thead><tbody>";

  rows.forEach(row => {
    html += "<tr>";
    columns.forEach(col => {
      html += `<td>${row[col] ?? ""}</td>`;
    });
    html += "</tr>";
  });

  html += "</tbody></table>";

  return `<div class="table-wrapper">${html}</div>`;
}


/* ===============================
 * node 選択時レンダリング
 * =============================== */
function renderNodeData(nodeId, nodeLabel) {
  let html = `<h2>${nodeLabel}</h2>`;

  Object.entries(dfStore).forEach(([dfName, df]) => {
    const filtered = df.filter(r => r.node_baseid == nodeId);

    if (filtered.length === 0) return;
    if (!hasVisibleColumns(filtered)) return;

    html += `<h3>${dfName}</h3>`;
    html += renderTable(filtered);
  });

  return html;
}

function showPanel() {
  const panel = document.getElementById("panel");
  const cyDiv = document.getElementById("cy");

  panel.style.display = "block";
  cyDiv.style.height = "450px";  // 上を少し縮める
  cy.resize();
}

function hidePanel() {
  const panel = document.getElementById("panel");
  const cyDiv = document.getElementById("cy");

  panel.style.display = "none";
  cyDiv.style.height = "650px";  // 元に戻す
  cy.resize();
}

function hasVisibleColumns(rows) {
  if (rows.length === 0) return false;

  const columns = Object.keys(rows[0]).filter(c => c !== "node_baseid");

  return columns.some(col =>
    rows.some(row => row[col] !== null && row[col] !== "" && row[col] !== undefined)
  );
}

/* ===============================
 * cytoscape
 * =============================== */
const cy = cytoscape({
  container: document.getElementById("cy"),
  elements: elements,
  layout: { name: "preset" },
  style: [{'selector': 'node', 'style': {'label': 'data(label)', 'width': 20, 'height': 20}}, {'selector': 'edge', 'style': {'width': 3, 'curve-style': 'bezier', 'target-arrow-shape': 'triangle', 'label': 'data(label)', 'events': 'no'}}]
});

cy.on("tap", "node", evt => {
  const node = evt.target;
  showPanel();
  document.getElementById("panel").innerHTML =
    renderNodeData(
      node.data("id"),
      node.data("label")
    );
});

cy.on("tap", evt => {
  if (evt.target === cy) {
    hidePanel();
  }
});
